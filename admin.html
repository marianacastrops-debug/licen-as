<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Infinity Live · Admin</title>
<style>
:root{--bg:#060C18;--surface:#0D1526;--card:#111927;--border:#1E2D45;--red:#E8000F;--green:#00E676;--yellow:#FFD600;--blue:#00C8FF;--text:#EEF0F6;--muted:#6B7A90;--danger:#FF3355}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;font-size:13px;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff}
.logo-txt{font-size:16px;font-weight:800}
.logo-txt span{color:var(--red)}
.main{padding:24px;max-width:1200px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:28px;font-weight:800;margin-top:6px}
.stat-value.green{color:var(--green)}.stat-value.red{color:var(--danger)}.stat-value.blue{color:var(--blue)}.stat-value.yellow{color:var(--yellow)}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.toolbar-title{font-size:15px;font-weight:700;flex:1}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--red);color:#fff}.btn-success{background:var(--green);color:#000}
.btn-warning{background:var(--yellow);color:#000}.btn-danger{background:var(--danger);color:#fff}
.btn-ghost{background:var(--border);color:var(--text)}.btn-sm{padding:5px 10px;font-size:11px}
.filter-input,.filter-select{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 14px;font-size:12px;outline:none;font-family:inherit}
.filter-input{width:220px}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{background:var(--surface);padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,0.025)}
tbody td{padding:12px 16px;vertical-align:middle}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.badge-ativa{background:rgba(0,230,118,.15);color:var(--green)}.badge-inativa{background:rgba(255,51,85,.15);color:var(--danger)}
.badge-expirada{background:rgba(255,214,0,.15);color:var(--yellow)}.badge-mensal{background:rgba(0,200,255,.12);color:var(--blue)}
.badge-mentoria{background:rgba(232,0,15,.12);color:#ff6b6b}.badge-vitalicio{background:rgba(0,230,118,.12);color:var(--green)}
.chave-txt{font-family:monospace;font-size:14px;font-weight:700;letter-spacing:2px;color:var(--blue)}
.slots-bar{display:flex;align-items:center;gap:8px}
.slots-dots{display:flex;gap:4px}
.slot-dot{width:10px;height:10px;border-radius:50%;background:var(--border)}
.slot-dot.usado{background:var(--green)}.slot-dot.cheio{background:var(--danger)}
.slots-txt{font-size:11px;color:var(--muted);white-space:nowrap}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.devices-wrap{background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.device-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:11px}
.device-item:last-child{border-bottom:none}
.device-icon{width:28px;height:28px;background:rgba(0,200,255,0.1);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.device-info{flex:1;min-width:0}
.device-nome{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.device-uuid{font-family:monospace;font-size:10px;color:var(--muted);margin-top:1px}
.device-acesso{font-size:10px;color:var(--muted);white-space:nowrap}
.row-detail{background:rgba(0,0,0,.3)!important}
.row-detail td{padding:0 16px 14px!important}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(4,7,16,0.85);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:420px;max-width:95vw}
.modal-title{font-size:15px;font-weight:800;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;display:block}
.form-inp,.form-sel{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 14px;font-size:13px;outline:none;font-family:inherit}
.form-inp:focus,.form-sel:focus{border-color:var(--blue)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;margin-top:22px;justify-content:flex-end}
#toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;font-weight:600;display:none;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#toast.show{display:flex}
#toast.ok{border-color:rgba(0,230,118,.4);color:var(--green)}
#toast.err{border-color:rgba(255,51,85,.4);color:var(--danger)}
.loading,.empty{color:var(--muted);text-align:center;padding:40px}
@media(max-width:768px){.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">&#8734;</div>
    <div class="logo-txt">Infinity<span>Live</span> &middot; Admin</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="btn btn-ghost btn-sm" id="btn-atualizar">&#8635; Atualizar</button>
  </div>
</div>

<div class="main">
  <div class="stats">
    <div class="stat-card"><div class="stat-label">Total de chaves</div><div class="stat-value blue" id="s-total">0</div></div>
    <div class="stat-card"><div class="stat-label">Ativas</div><div class="stat-value green" id="s-ativas">0</div></div>
    <div class="stat-card"><div class="stat-label">Revogadas</div><div class="stat-value red" id="s-inativas">0</div></div>
    <div class="stat-card"><div class="stat-label">Expiradas</div><div class="stat-value yellow" id="s-expiradas">0</div></div>
  </div>
  <div class="toolbar">
    <div class="toolbar-title">Chaves de licenca</div>
    <input class="filter-input" id="filtro-busca" placeholder="Buscar chave, cliente...">
    <select class="filter-select" id="filtro-tipo">
      <option value="">Todos os tipos</option>
      <option value="mensal">Mensal</option>
      <option value="mentoria">Mentoria</option>
      <option value="vitalicio">Vitalicio</option>
    </select>
    <select class="filter-select" id="filtro-status">
      <option value="">Todos os status</option>
      <option value="ativa">Ativas</option>
      <option value="inativa">Inativas</option>
      <option value="expirada">Expiradas</option>
    </select>
    <button class="btn btn-primary" id="btn-gerar">+ Gerar chave</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Chave</th><th>Cliente / Obs.</th><th>Tipo</th><th>Status</th>
        <th>Devices</th><th>Expira em</th><th>Ultimo acesso</th><th>Acoes</th>
      </tr></thead>
      <tbody id="tabela-body"><tr><td colspan="8" class="loading">Carregando...</td></tr></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modal-gerar">
  <div class="modal">
    <div class="modal-title">+ Gerar nova(s) chave(s)</div>
    <div class="form-group"><label class="form-label">Cliente / Observacao</label><input class="form-inp" id="g-obs" placeholder="Ex: Joao Silva"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Tipo</label>
        <select class="form-sel" id="g-tipo"><option value="mensal">Mensal</option><option value="mentoria">Mentoria</option><option value="vitalicio">Vitalicio</option></select>
      </div>
      <div class="form-group"><label class="form-label">Max dispositivos</label><input class="form-inp" id="g-maxdev" type="number" value="1" min="1" max="10"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Expira em (vazio = sem expiracao)</label><input class="form-inp" id="g-expira" type="date"></div>
      <div class="form-group"><label class="form-label">Quantidade</label><input class="form-inp" id="g-qtd" type="number" value="1" min="1" max="50"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btn-cancelar-gerar">Cancelar</button>
      <button class="btn btn-primary" id="btn-confirmar-gerar">Gerar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-editar">
  <div class="modal">
    <div class="modal-title">Editar chave</div>
    <input type="hidden" id="e-id">
    <div class="form-group"><label class="form-label">Cliente / Observacao</label><input class="form-inp" id="e-obs"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Max dispositivos</label><input class="form-inp" id="e-maxdev" type="number" min="1" max="10"></div>
      <div class="form-group"><label class="form-label">Nova expiracao</label><input class="form-inp" id="e-expira" type="date"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btn-cancelar-editar">Cancelar</button>
      <button class="btn btn-success" id="btn-confirmar-editar">Salvar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
var SB_URL = 'https://yvzsgiltneiwuyxvbjsg.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2enNnaWx0bmVpd3V5eHZianNnIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTgzNDY3MSwiZXhwIjoyMDk3NDEwNjcxfQ.Bo2qzahYV5K55ijBiOq8j0F1ekA9ZhEtQL5S5YktAQ8';
var todasChaves = [];
var expandidoId = null;

function sbH(){ return {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'}; }
function sbGet(t,p){var url=SB_URL+'/rest/v1/'+t+'?select=*';if(p)Object.keys(p).forEach(function(k){url+='&'+k+'='+encodeURIComponent(p[k]);});return fetch(url,{headers:sbH()}).then(function(r){return r.json();});}
function sbPost(t,d){return fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:sbH(),body:JSON.stringify(d)}).then(function(r){return r.json();});}
function sbPatch(t,f,d){return fetch(SB_URL+'/rest/v1/'+t+'?'+f,{method:'PATCH',headers:sbH(),body:JSON.stringify(d)}).then(function(r){return r.json();});}
function sbDelete(t,f){return fetch(SB_URL+'/rest/v1/'+t+'?'+f,{method:'DELETE',headers:sbH()}).then(function(r){return r.status;});}

document.getElementById('btn-atualizar').addEventListener('click', carregar);

function carregar() {
  document.getElementById('tabela-body').innerHTML='<tr><td colspan="8" class="loading">Carregando...</td></tr>';
  sbGet('licencas',{order:'criada_em.desc'}).then(function(chaves){
    if(!Array.isArray(chaves)){toast('Erro ao carregar.','err');return;}
    if(!chaves.length){todasChaves=[];atualizarStats();filtrar();return;}
    var pendentes=chaves.length;
    chaves.forEach(function(c){c.devices=[];c.slots_usados=0;});
    chaves.forEach(function(c){
      sbGet('licenca_devices',{'licenca_id':'eq.'+c.id,'order':'ativado_em.asc'}).then(function(devs){
        c.devices=Array.isArray(devs)?devs:[];
        c.slots_usados=c.devices.length;
        if(--pendentes===0){todasChaves=chaves;atualizarStats();filtrar();}
      }).catch(function(){if(--pendentes===0){todasChaves=chaves;atualizarStats();filtrar();}});
    });
  }).catch(function(){toast('Erro de conexao.','err');});
}

function atualizarStats(){
  var agora=new Date(),ativas=0,inativas=0,expiradas=0;
  todasChaves.forEach(function(c){if(!c.ativa){inativas++;return;}if(c.expira_em&&new Date(c.expira_em)<agora){expiradas++;return;}ativas++;});
  document.getElementById('s-total').textContent=todasChaves.length;
  document.getElementById('s-ativas').textContent=ativas;
  document.getElementById('s-inativas').textContent=inativas;
  document.getElementById('s-expiradas').textContent=expiradas;
}

document.getElementById('filtro-busca').addEventListener('input',filtrar);
document.getElementById('filtro-tipo').addEventListener('change',filtrar);
document.getElementById('filtro-status').addEventListener('change',filtrar);
function filtrar(){
  var busca=document.getElementById('filtro-busca').value.toLowerCase();
  var tipo=document.getElementById('filtro-tipo').value;
  var status=document.getElementById('filtro-status').value;
  var agora=new Date();
  renderTabela(todasChaves.filter(function(c){
    if(busca&&!c.chave.toLowerCase().includes(busca)&&!(c.observacao||'').toLowerCase().includes(busca))return false;
    if(tipo&&c.tipo!==tipo)return false;
    if(status==='ativa'){if(!c.ativa||(c.expira_em&&new Date(c.expira_em)<agora))return false;}
    if(status==='inativa'){if(c.ativa)return false;}
    if(status==='expirada'){if(!c.expira_em||new Date(c.expira_em)>=agora)return false;}
    return true;
  }));
}

function renderTabela(chaves){
  var tbody=document.getElementById('tabela-body');
  if(!chaves.length){tbody.innerHTML='<tr><td colspan="8" class="empty">Nenhuma chave encontrada.</td></tr>';return;}
  var agora=new Date();tbody.innerHTML='';
  chaves.forEach(function(c){
    var sC,sL;
    if(!c.ativa){sC='badge-inativa';sL='Revogada';}
    else if(c.expira_em&&new Date(c.expira_em)<agora){sC='badge-expirada';sL='Expirada';}
    else{sC='badge-ativa';sL='Ativa';}
    var tL={mensal:'Mensal',mentoria:'Mentoria',vitalicio:'Vitalicio'}[c.tipo]||c.tipo;
    var max=c.max_devices||1,us=c.slots_usados||0,dots='';
    for(var i=0;i<max;i++)dots+='<div class="slot-dot'+(i<us?(us>=max?' cheio':' usado'):'')+'" ></div>';
    var expFmt=c.expira_em?new Date(c.expira_em).toLocaleDateString('pt-BR'):'—';
    var tr=document.createElement('tr');
    tr.innerHTML=
      '<td><div class="chave-txt">'+esc(c.chave)+'</div><div style="font-size:10px;color:var(--muted);font-family:monospace">'+c.id.slice(0,8)+'...</div></td>'+
      '<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(c.observacao?esc(c.observacao):'<span style="color:var(--muted);font-style:italic">sem descricao</span>')+'</td>'+
      '<td><span class="badge badge-'+(c.tipo||'mensal')+'">'+tL+'</span></td>'+
      '<td><span class="badge '+sC+'">'+sL+'</span></td>'+
      '<td><div class="slots-bar"><div class="slots-dots">'+dots+'</div><div class="slots-txt">'+us+'/'+max+'</div></div>'+
        '<div style="font-size:10px;color:var(--muted);margin-top:3px">'+c.devices.length+' disp. <span class="vd" data-id="'+c.id+'" style="cursor:pointer;color:var(--blue);margin-left:4px">'+(expandidoId===c.id?'&#9650; ocultar':'&#9660; ver')+'</span></div></td>'+
      '<td>'+expFmt+'</td>'+
      '<td style="color:var(--muted);font-size:11px">'+ulAcesso(c.devices)+'</td>'+
      '<td><div class="actions">'+
        '<button class="btn btn-ghost btn-sm be" data-id="'+c.id+'">&#9998;</button>'+
        (c.ativa?'<button class="btn btn-danger btn-sm br" data-id="'+c.id+'">Revogar</button>':
                 '<button class="btn btn-success btn-sm bra" data-id="'+c.id+'">Reativar</button>')+
        '<button class="btn btn-warning btn-sm brs" data-id="'+c.id+'" data-chave="'+esc(c.chave)+'">&#8635; Reset</button>'+
        '<button class="btn btn-ghost btn-sm bcp" data-chave="'+esc(c.chave)+'">&#128203;</button>'+
      '</div></td>';
    tbody.appendChild(tr);
    var td=document.createElement('tr');td.className='row-detail';td.style.display=expandidoId===c.id?'':'none';
    td.innerHTML='<td colspan="8">'+renderDevs(c.devices,c.id)+'</td>';
    tbody.appendChild(td);
  });
  tbody.querySelectorAll('.vd').forEach(function(el){el.addEventListener('click',function(){expandidoId=expandidoId===el.dataset.id?null:el.dataset.id;filtrar();});});
  tbody.querySelectorAll('.be').forEach(function(el){el.addEventListener('click',function(){abrirEditar(el.dataset.id);});});
  tbody.querySelectorAll('.br').forEach(function(el){el.addEventListener('click',function(){revogar(el.dataset.id);});});
  tbody.querySelectorAll('.bra').forEach(function(el){el.addEventListener('click',function(){reativar(el.dataset.id);});});
  tbody.querySelectorAll('.brs').forEach(function(el){el.addEventListener('click',function(){resetar(el.dataset.id,el.dataset.chave);});});
  tbody.querySelectorAll('.bcp').forEach(function(el){el.addEventListener('click',function(){copiar(el.dataset.chave);});});
  tbody.querySelectorAll('.brd').forEach(function(el){el.addEventListener('click',function(){removerDevice(el.dataset.did,el.dataset.cid);});});
}

function renderDevs(devices,cid){
  if(!devices.length)return '<div style="padding:10px;color:var(--muted);font-size:12px">Nenhum dispositivo ainda.</div>';
  return '<div class="devices-wrap">'+devices.map(function(d){
    return '<div class="device-item"><div class="device-icon">&#128187;</div>'+
      '<div class="device-info"><div class="device-nome">'+esc(d.device_nome)+'</div><div class="device-uuid">'+d.device_uuid+'</div></div>'+
      '<div class="device-acesso"><div>Ativado: '+fmtD(d.ativado_em)+'</div><div>Ultimo: '+fmtD(d.ultimo_acesso)+'</div></div>'+
      '<button class="btn btn-danger btn-sm brd" data-did="'+d.id+'" data-cid="'+cid+'" style="margin-left:10px">&#10005;</button></div>';
  }).join('')+'</div>';
}

function revogar(id){if(!confirm('Revogar esta chave?'))return;sbPatch('licencas','id=eq.'+id,{ativa:false}).then(function(){toast('Revogada!');carregar();});}
function reativar(id){sbPatch('licencas','id=eq.'+id,{ativa:true}).then(function(){toast('Reativada!');carregar();});}
function resetar(id,ch){if(!confirm('Resetar todos os devices da chave '+ch+'?'))return;sbDelete('licenca_devices','licenca_id=eq.'+id).then(function(){toast('Devices resetados!');expandidoId=null;carregar();});}
function removerDevice(did,cid){if(!confirm('Remover este dispositivo?'))return;sbDelete('licenca_devices','id=eq.'+did).then(function(){toast('Device removido.');carregar();});}
function copiar(ch){navigator.clipboard.writeText(ch).then(function(){toast('Chave copiada!');});}

function gerarChave(){var c='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',r='';for(var i=0;i<4;i++)r+=c[Math.floor(Math.random()*c.length)];return 'IL-'+r;}

document.getElementById('btn-gerar').addEventListener('click',function(){document.getElementById('modal-gerar').classList.add('show');});
document.getElementById('btn-cancelar-gerar').addEventListener('click',function(){document.getElementById('modal-gerar').classList.remove('show');});
document.getElementById('btn-confirmar-gerar').addEventListener('click',function(){
  var tipo=document.getElementById('g-tipo').value;
  var maxDev=parseInt(document.getElementById('g-maxdev').value)||1;
  var expira=document.getElementById('g-expira').value;
  var qtd=Math.min(parseInt(document.getElementById('g-qtd').value)||1,50);
  var obs=document.getElementById('g-obs').value.trim();
  var geradas=[],pendentes=qtd;
  for(var i=0;i<qtd;i++){(function(){
    var ch=gerarChave();
    sbPost('licencas',{chave:ch,tipo:tipo,max_devices:maxDev,ativa:true,expira_em:expira?expira+'T23:59:59Z':null,criada_em:new Date().toISOString(),observacao:obs})
    .then(function(){geradas.push(ch);if(--pendentes===0){document.getElementById('modal-gerar').classList.remove('show');navigator.clipboard.writeText(geradas.join('\n')).catch(function(){});toast(geradas.length===1?'Chave: '+geradas[0]:geradas.length+' chaves geradas!');carregar();}})
    .catch(function(){if(--pendentes===0)toast('Erro ao gerar.','err');});
  })();}
});

function abrirEditar(id){
  var c=todasChaves.find(function(x){return x.id===id;});if(!c)return;
  document.getElementById('e-id').value=c.id;
  document.getElementById('e-obs').value=c.observacao||'';
  document.getElementById('e-maxdev').value=c.max_devices||1;
  document.getElementById('e-expira').value=c.expira_em?c.expira_em.slice(0,10):'';
  document.getElementById('modal-editar').classList.add('show');
}
document.getElementById('btn-cancelar-editar').addEventListener('click',function(){document.getElementById('modal-editar').classList.remove('show');});
document.getElementById('btn-confirmar-editar').addEventListener('click',function(){
  var id=document.getElementById('e-id').value;
  var expira=document.getElementById('e-expira').value;
  sbPatch('licencas','id=eq.'+id,{observacao:document.getElementById('e-obs').value.trim(),max_devices:parseInt(document.getElementById('e-maxdev').value)||1,expira_em:expira?expira+'T23:59:59Z':null})
  .then(function(){toast('Atualizado!');document.getElementById('modal-editar').classList.remove('show');carregar();});
});

document.querySelectorAll('.modal-overlay').forEach(function(o){o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('show');});});

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtD(iso){if(!iso)return '—';try{return new Date(iso).toLocaleString('pt-BR',{dateStyle:'short',timeStyle:'short'});}catch(e){return iso;}}
function ulAcesso(d){if(!d||!d.length)return '—';var ds=d.map(function(x){return new Date(x.ultimo_acesso);}).filter(function(x){return !isNaN(x);});if(!ds.length)return '—';return fmtD(new Date(Math.max.apply(null,ds)).toISOString());}
var tt;function toast(msg,tipo){tipo=tipo||'ok';var el=document.getElementById('toast');el.textContent=(tipo==='ok'?'✓ ':'✕ ')+msg;el.className='show '+tipo;clearTimeout(tt);tt=setTimeout(function(){el.className='';},3500);}

window.addEventListener('load', carregar);
</script>
</body>
